<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>UTUPanel</title>

<link rel="stylesheet" href="../../../css/generales.css">
<link rel="stylesheet" href="../../../css/mis_tickets.css">

</head>

<body>

<main class="main" id="scroll">

    <!-- TABS -->

    <div class="tabs-wrapper">

        <a class="tab active" href="../../general(tickets)/tickets/tickets.html">
            General
        </a>

        <a class="tab" href="../../prestamos/index.html">
            Préstamos
        </a>

    </div>

    <!-- CONTENIDO -->

    <div class="tab-content active">

        <div class="tab-layout app" id="generalApp">

            <!-- SIDEBAR -->

            <aside class="sidebar">

                <div class="sidebar-toggle" data-toggle="generalApp">
                    ‹‹
                </div>

                <div>

                    <div class="brand">
                        <h1>UTU<span>Panel</span></h1>
                    </div>

                    <nav class="menu">

                        <a href="../tickets/tickets.html" class="active">
                            <span class="icon">●</span>
                            <span>Tickets</span>
                        </a>

                        <a href="../salones_y_laboratorios/index.html">
                            <span class="icon">●</span>
                            <span>Salones y Laboratorios</span>
                        </a>

                        <a href="../agenda/index.html">
                            <span class="icon">●</span>
                            <span>Agenda</span>
                        </a>

                        <a href="../metricas/index.html">
                            <span class="icon">●</span>
                            <span>Métricas</span>
                        </a>

                    </nav>

                </div>

                <div class="sidebar-footer">

                    <a href="../mantenimiento/index.html">
                        <span class="icon">⚙</span>
                        <span>Mantenimiento</span>
                    </a>

                    <a href="../../login.html">
                        <span class="icon">⏼</span>
                        <span>Cerrar sesión</span>
                    </a>

                </div>

            </aside>

            <!-- PANEL DE CONTENIDO -->
            <div class="content-panel">

                <!-- HEADER -->
                <section class="header">

                    <h2>Mis Tickets</h2>

                    <p>
                        Tickets asignados a mi.
                    </p>

                </section>

                <!-- FILTROS -->
                <div class="form-card">
                    <section class="ticket-filters-card">

                        <form class="ticket-filters">
                            
                            <div class="form-group">
                                <label for="filtro_tipo">Tipo</label>
                                <select id="filtro_tipo">
                                    <option value="" selected>Todos</option>
                                    <option value="incidencia">Incidencia</option>
                                    <option value="requerimiento">Requerimiento</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="filtro_asignado">Asignado</label>
                                <select id="filtro_asignado">
                                    <option value="" selected>Todos</option>
                                    <option value="a_mi">A mi</option>
                                    <option value="asistente">Asistente</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="filtro_fecha">Fecha</label>
                                <input type="date" id="filtro_fecha">
                            </div>

                            <div class="form-group">
                                <label for="filtro_estado">Estado</label>
                                <select id="filtro_estado">
                                    <option value="">Todos</option>
                                    <option value="pendiente">Pendiente</option>
                                    <option value="en_proceso" selected>En proceso</option>
                                    <option value="cerrado">Cerrado</option>
                                    <option value="vencido">Vencido</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="filtro_prioridad">Prioridad</label>
                                <select id="filtro_prioridad">
                                    <option value="" selected>Todas</option>
                                    <option>Baja</option>
                                    <option>Media</option>
                                    <option>Alta</option>
                                    <option>Crítica</option>
                                </select>
                            </div>

                        </form>

                    </section>

                    <!-- LISTADO -->
                    <section class="">

                        <div class="ticket-list">

                            

                        </div>

                    </section>
                </div>
            </div>

        </div>

    </div>

</main>

<script src="../../../javascript/general.js"></script>

</body>
</html>
